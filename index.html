  <script>
  // 古いService Workerを自動削除
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(regs => {
      regs.forEach(r => r.unregister());
    });
    caches.keys().then(keys => { keys.forEach(k => caches.delete(k)); });
  }
  </script>

    const OWNER_ID = '99999';
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbwsk8I_pP8XDbz_XA3jjb7X9tQsmCo4df_fW7X1wa0eaXqef1aeEsAdr_mGAf6jhJZ8oA/exec';

    let currentMember = null;
    const prices = [50, 100, 200, 400, 750, 800];
    const cart = {};
    prices.forEach(p => cart[p] = 0);

    // ローカルキャッシュ
    let cachedRecords = [];
    let recordsLoaded = false;

    function loadRecords() { return cachedRecords; }
    function saveRecords(records) {
      cachedRecords = records;
      localStorage.setItem('glico_records', JSON.stringify(records));
    }

    // 日時正規化（ISO→JST）
    function normalizeDateTime(dt) {
      if (!dt) return '';
      const s = String(dt);
      if (/^\d{4}\/\d{2}\/\d{2}/.test(s)) return s;
      if (s.includes('T') || s.includes('-')) {
        const d = new Date(s);
        if (!isNaN(d.getTime())) {
          const jst = new Date(d.getTime() + 9 * 60 * 60 * 1000);
          return jst.getUTCFullYear() + '/' + String(jst.getUTCMonth()+1).padStart(2,'0') + '/' + String(jst.getUTCDate()).padStart(2,'0') + ' ' + String(jst.getUTCHours()).padStart(2,'0') + ':' + String(jst.getUTCMinutes()).padStart(2,'0');
        }
      }
      return s;
    }
    function getDatePart(dt) {
      const n = normalizeDateTime(dt);
      return n.split(' ')[0];
    }

    // サーバー通信
    async function fetchRecordsFromServer() {
      try {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        if (Array.isArray(data)) {
          data.forEach(r => { if (r.日時) r.日時 = normalizeDateTime(r.日時); });
          if (data.length > 0) {
            cachedRecords = data;
            localStorage.setItem('glico_records', JSON.stringify(data));
            recordsLoaded = true;
          } else {
            // サーバー空 → ローカルにデータあれば全部アップロード
            const local = (() => { try { const d = localStorage.getItem('glico_records'); return d ? JSON.parse(d) : []; } catch { return []; } })();
            if (local.length > 0) {
              for (const r of local) { await addRecordToServer(r); }
              cachedRecords = local;
            } else {
              cachedRecords = [];
            }
            recordsLoaded = true;
          }
        }
      } catch (e) {
        console.log('サーバー接続失敗、ローカルデータ使用', e);
        const local = (() => { try { const d = localStorage.getItem('glico_records'); return d ? JSON.parse(d) : []; } catch { return []; } })();
        cachedRecords = local;
        recordsLoaded = true;
      }
    }

    function postToServer(payload) {
      // no-cors POST — GAS側でe.postData.contentsとしてJSON受信
      try {
        fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          body: JSON.stringify(payload)
        }).catch(e => console.log('POST失敗', e));
      } catch (e) { console.log('POST例外', e); }
    }

    function addRecordToServer(record) {
      postToServer({ action: 'add', record: record });
    }

    function deleteRecordFromServer(rid) {
      postToServer({ action: 'delete', rid: rid });
    }

    // 起動時にローカルキャッシュ読み込み
    (() => {
      try { const d = localStorage.getItem('glico_records'); cachedRecords = d ? JSON.parse(d) : []; }
      catch { cachedRecords = []; }
    })();

    // 月管理
    let selectedMonthIndex = 0; // 0 = 今月, 1 = 先月, ... , -1 = 全期間
    let availableMonths = []; // ['全期間', '2026/03', '2026/02', ...]

    function buildAvailableMonths() {
      const records = loadRecords();
      const monthSet = new Set();
      records.forEach(r => {
        if (r.日時) {
          const parts = r.日時.split('/');
          if (parts.length >= 2) monthSet.add(parts[0] + '/' + parts[1]);
        }
      });
      const sorted = [...monthSet].sort().reverse();
      availableMonths = ['全期間', ...sorted];
      if (selectedMonthIndex >= availableMonths.length) selectedMonthIndex = 0;
    }

    function getFilteredRecords() {
      const records = loadRecords();
      const label = availableMonths[selectedMonthIndex];
      if (!label || label === '全期間') return records;
      return records.filter(r => r.日時 && r.日時.startsWith(label));
    }

    function updateMonthLabel() {
      const label = availableMonths[selectedMonthIndex] || '全期間';
      const el = document.getElementById('current-month-label');
      if (label === '全期間') {
        el.textContent = '📅 全期間';
      } else {
        const [y, m] = label.split('/');
        el.textContent = '📅 ' + y + '年' + parseInt(m) + '月';
      }
    }

    // DOM
    const screens = ['screen-input','screen-purchase','screen-done','screen-owner'];
    const staffIdInput = document.getElementById('staff-id');
    const msgInput = document.getElementById('msg-input');
    const msgPurchase = document.getElementById('msg-purchase');
    const memberDept = document.getElementById('member-dept');
    const memberName = document.getElementById('member-name');
    const totalDisplay = document.getElementById('total-display');

    function showScreen(name) {
      screens.forEach(s => document.getElementById(s).classList.add('hidden'));
      document.getElementById('screen-' + name).classList.remove('hidden');
    }

    function showMessage(el, text) {
      el.textContent = text;
      el.classList.remove('hidden');
      setTimeout(() => { el.textContent = ''; el.classList.add('hidden'); }, 2000);
    }

    function getTotal() {
      return Object.entries(cart).reduce((sum, [p, c]) => sum + Number(p) * c, 0);
    }
    function updateTotal() { totalDisplay.textContent = '合計: ' + getTotal() + '円'; }
    function updateCount(price) {
      document.getElementById('count-' + price).textContent = cart[price];
      updateTotal();
    }
    function addItem(price) { cart[price]++; updateCount(price); }
    function removeItem(price) { if (cart[price] > 0) { cart[price]--; updateCount(price); } }
    function resetCart() { prices.forEach(p => { cart[p] = 0; updateCount(p); }); }

    // 職員番号送信
    document.getElementById('btn-submit').addEventListener('click', () => {
      const id = staffIdInput.value.trim();
      if (id === '99999') { location.reload(); return; }
      if (id === OWNER_ID) { staffIdInput.value = ''; openOwnerMode(); return; }
      const member = members.find(m => m.id === id);
      if (member) {
        currentMember = member;
        memberDept.textContent = member.dept;
        memberName.textContent = member.name;
        resetCart();
        showScreen('purchase');
      } else {
        showMessage(msgInput, '登録がありません');
      }
    });
    staffIdInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') document.getElementById('btn-submit').click(); });

    // キャンセル
    document.getElementById('btn-cancel').addEventListener('click', () => {
      currentMember = null; staffIdInput.value = ''; resetCart();
      showScreen('input'); staffIdInput.focus();
    });

    // 購入
    document.getElementById('btn-purchase').addEventListener('click', () => {
      if (getTotal() === 0) { showMessage(msgPurchase, '商品を選んでください'); return; }
      const now = new Date();
      const record = {
        日時: now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0') + '/' + String(now.getDate()).padStart(2,'0') + ' ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0'),
        職員番号: currentMember.id,
        氏名: currentMember.name,
        所属: currentMember.dept,
        '50円': cart[50], '100円': cart[100], '200円': cart[200], '400円': cart[400], '750円': cart[750], '800円': cart[800],
        合計金額: getTotal()
      };
      const records = loadRecords(); records.push(record); saveRecords(records);
      addRecordToServer(record);
      showScreen('done');
      setTimeout(() => {
        currentMember = null; staffIdInput.value = ''; resetCart();
        showScreen('input'); staffIdInput.focus();
      }, 8000);
    });

    // ====== オーナーモード ======

    async function openOwnerMode() {
      showScreen('owner');
      const loading = document.getElementById('owner-loading');
      const content = document.getElementById('owner-content');
      loading.classList.remove('hidden');
      content.style.opacity = '0.5';
      try {
        await fetchRecordsFromServer();
      } catch(e) { console.log('fetch error', e); }
      loading.classList.add('hidden');
      content.style.opacity = '1';
      selectedMonthIndex = 0;
      buildAvailableMonths();
      const now = new Date();
      const thisMonth = now.getFullYear() + '/' + String(now.getMonth()+1).padStart(2,'0');
      const idx = availableMonths.indexOf(thisMonth);
      if (idx >= 0) selectedMonthIndex = idx;
      refreshOwner();
    }

    function refreshOwner() {
      updateMonthLabel();
      renderCalendar();
      renderSummary();
      renderAgeAnalysis();
      renderHistory();
    }

    // ====== カレンダー ======
    let calYear, calMonth;
    (() => { const n = new Date(); calYear = n.getFullYear(); calMonth = n.getMonth(); })();

    document.getElementById('btn-cal-prev').addEventListener('click', () => {
      calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; }
      renderCalendar();
    });
    document.getElementById('btn-cal-next').addEventListener('click', () => {
      calMonth++; if (calMonth > 11) { calMonth = 0; calYear++; }
      renderCalendar();
    });

    function renderCalendar() {
      document.getElementById('cal-title').textContent = '📅 ' + calYear + '年' + (calMonth + 1) + '月';
      document.getElementById('cal-day-detail').classList.add('hidden');

      const allRecords = loadRecords();
      // 日別売上集計
      const dailySales = {};
      allRecords.forEach(r => {
        const d = getDatePart(r.日時);
        if (d) dailySales[d] = (dailySales[d] || 0) + (r.合計金額 || 0);
      });

      const firstDay = new Date(calYear, calMonth, 1);
      let startDow = firstDay.getDay(); // 0=日
      startDow = startDow === 0 ? 6 : startDow - 1; // 月曜始まり
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();

      // 当月の最大売上（ヒートマップ用）
      let maxSale = 0;
      for (let d = 1; d <= daysInMonth; d++) {
        const key = calYear + '/' + String(calMonth + 1).padStart(2, '0') + '/' + String(d).padStart(2, '0');
        if ((dailySales[key] || 0) > maxSale) maxSale = dailySales[key];
      }

      let html = '';
      // 空白セル
      for (let i = 0; i < startDow; i++) html += '<div class="h-10"></div>';
      // 日セル
      for (let d = 1; d <= daysInMonth; d++) {
        const key = calYear + '/' + String(calMonth + 1).padStart(2, '0') + '/' + String(d).padStart(2, '0');
        const sale = dailySales[key] || 0;
        const intensity = maxSale > 0 ? Math.min(sale / maxSale, 1) : 0;
        const bg = sale > 0
          ? 'background:rgba(22,163,74,' + (0.15 + intensity * 0.7) + ')'
          : '';
        const textColor = intensity > 0.5 ? 'color:white' : '';
        const today = new Date();
        const isToday = (calYear === today.getFullYear() && calMonth === today.getMonth() && d === today.getDate());
        const ring = isToday ? 'ring-2 ring-amber-400' : '';
        html += '<div class="h-10 rounded-lg flex flex-col items-center justify-center cursor-pointer hover:ring-2 hover:ring-slate-300 text-xs ' + ring + '" style="' + bg + ';' + textColor + '" onclick="showDayDetail(\'' + key + '\')">';
        html += '<span class="font-bold">' + d + '</span>';
        if (sale > 0) html += '<span style="font-size:0.6rem">' + (sale >= 1000 ? Math.round(sale / 1000) + 'k' : sale) + '</span>';
        html += '</div>';
      }
      document.getElementById('cal-grid').innerHTML = html;
    }

    function showDayDetail(dateStr) {
      const allRecords = loadRecords();
      const dayRecords = allRecords.filter(r => getDatePart(r.日時) === dateStr);
      const el = document.getElementById('cal-day-detail');

      if (dayRecords.length === 0) {
        el.innerHTML = '<p class="text-center text-slate-400 text-sm py-2">' + dateStr + ' の購入なし</p>';
        el.classList.remove('hidden');
        return;
      }

      const totalSales = dayRecords.reduce((s, r) => s + (r.合計金額 || 0), 0);
      const totalItems = dayRecords.reduce((s, r) => { let c = 0; prices.forEach(p => { c += (r[p + '円'] || 0); }); return s + c; }, 0);

      let html = '<div class="bg-green-50 rounded-xl p-3">';
      html += '<div class="flex justify-between items-center mb-2"><span class="font-bold text-green-800">' + dateStr + '</span>';
      html += '<span class="text-sm text-green-600">' + totalSales.toLocaleString() + '円 / ' + totalItems + '個</span></div>';
      html += '<div class="space-y-1">';
      dayRecords.forEach(r => {
        const items = prices.filter(p => (r[p + '円'] || 0) > 0).map(p => p + '円×' + r[p + '円']).join(' ');
        const time = r.日時 ? r.日時.split(' ')[1] || '' : '';
        html += '<div class="flex justify-between text-sm"><span class="text-slate-600">' + time + ' ' + r.氏名 + ' <span class="text-slate-400">' + items + '</span></span>';
        html += '<span class="font-bold text-green-700">' + (r.合計金額 || 0) + '円</span></div>';
      });
      html += '</div></div>';
      el.innerHTML = html;
      el.classList.remove('hidden');
    }

    // 月切り替え
    document.getElementById('btn-month-prev').addEventListener('click', () => {
      if (selectedMonthIndex < availableMonths.length - 1) {
        selectedMonthIndex++;
        refreshOwner();
      }
    });
    document.getElementById('btn-month-next').addEventListener('click', () => {
      if (selectedMonthIndex > 0) {
        selectedMonthIndex--;
        refreshOwner();
      }
    });

    // 売上サマリー
    function renderSummary() {
      const records = getFilteredRecords();
      const totalSales = records.reduce((s, r) => s + (r.合計金額 || 0), 0);
      const totalCount = records.length;
      const totalItems = records.reduce((s, r) => { let c = 0; prices.forEach(p => { c += (r[p + '円'] || 0); }); return s + c; }, 0);

      const priceBreakdown = {};
      prices.forEach(p => priceBreakdown[p] = 0);
      records.forEach(r => { prices.forEach(p => { priceBreakdown[p] += (r[p + '円'] || 0); }); });

      const byPerson = {};
      records.forEach(r => {
        const key = r.氏名 || '不明';
        byPerson[key] = (byPerson[key] || 0) + (r.合計金額 || 0);
      });
      const topBuyers = Object.entries(byPerson).sort((a, b) => b[1] - a[1]).slice(0, 5);

      document.getElementById('summary-content').innerHTML = `
        <div class="bg-amber-50 rounded-xl p-3 text-center">
          <p class="text-sm text-slate-500">売上合計</p>
          <p class="text-2xl font-bold text-amber-800">${totalSales.toLocaleString()}円</p>
        </div>
        <div class="bg-amber-50 rounded-xl p-3 text-center">
          <p class="text-sm text-slate-500">販売個数</p>
          <p class="text-2xl font-bold text-amber-800">${totalItems}個</p>
        </div>
        <div class="col-span-2 bg-slate-50 rounded-xl p-3">
          <p class="text-sm text-slate-500 mb-2">価格帯別 個数</p>
          <div class="flex flex-wrap gap-2">
            ${prices.map(p => `<span class="bg-white px-3 py-1 rounded-lg text-sm">${p}円: <b>${priceBreakdown[p]}個</b></span>`).join('')}
          </div>
        </div>
        <div class="col-span-2 bg-slate-50 rounded-xl p-3">
          <p class="text-sm text-slate-500 mb-2">購入額トップ5</p>
          ${topBuyers.length > 0 ? topBuyers.map((b, i) =>
            `<div class="flex justify-between py-1 ${i < topBuyers.length - 1 ? 'border-b border-slate-200' : ''}">
              <span class="text-sm">${i+1}. ${b[0]}</span>
              <span class="text-sm font-bold">${b[1].toLocaleString()}円</span>
            </div>`
          ).join('') : '<p class="text-sm text-slate-400">データなし</p>'}
        </div>
      `;
    }

    // 年齢別分析
    function renderAgeAnalysis() {
      const records = getFilteredRecords();
      const today = new Date();

      // Build member lookup by id
      const memberMap = {};
      members.forEach(m => { memberMap[m.id] = m; });

      // Group records by age bracket
      const brackets = {
        '20代': { count: 0, sales: 0, members: new Set() },
        '30代': { count: 0, sales: 0, members: new Set() },
        '40代': { count: 0, sales: 0, members: new Set() },
        '50代': { count: 0, sales: 0, members: new Set() },
        '60代+': { count: 0, sales: 0, members: new Set() }
      };

      records.forEach(r => {
        const member = memberMap[r.職員番号];
        if (!member || !member.birth) return;

        // Parse birth date (YYYY/MM/DD)
        const birthParts = member.birth.split('/');
        if (birthParts.length !== 3) return;
        const birthDate = new Date(birthParts[0], birthParts[1] - 1, birthParts[2]);

        // Calculate age
        let age = Math.floor((today - birthDate) / (365.25 * 24 * 60 * 60 * 1000));

        // Determine bracket
        let bracket;
        if (age >= 20 && age < 30) bracket = '20代';
        else if (age >= 30 && age < 40) bracket = '30代';
        else if (age >= 40 && age < 50) bracket = '40代';
        else if (age >= 50 && age < 60) bracket = '50代';
        else if (age >= 60) bracket = '60代+';
        else return;

        brackets[bracket].count++;
        brackets[bracket].sales += r.合計金額 || 0;
        brackets[bracket].members.add(r.職員番号);
      });

      // Calculate totals for percentage
      const totalSales = Object.values(brackets).reduce((sum, b) => sum + b.sales, 0);

      // Render
      const content = document.getElementById('age-analysis-content');
      const bracketOrder = ['20代', '30代', '40代', '50代', '60代+'];

      const html = bracketOrder.map(bracket => {
        const data = brackets[bracket];
        const uniqueMembers = data.members.size;
        const avgPerPerson = uniqueMembers > 0 ? Math.floor(data.sales / uniqueMembers) : 0;
        const percentage = totalSales > 0 ? (data.sales / totalSales) * 100 : 0;

        return `
          <div class="mb-4">
            <div class="flex justify-between items-center mb-2">
              <span class="font-bold text-slate-700">${bracket}</span>
              <span class="text-xs text-slate-500">${data.sales.toLocaleString()}円 / ${uniqueMembers}人</span>
            </div>
            <div class="flex gap-3 items-center">
              <div class="flex-1 h-6 bg-slate-100 rounded-full overflow-hidden">
                <div class="h-full bg-amber-500" style="width: ${percentage}%"></div>
              </div>
              <span class="text-sm text-slate-600 min-w-max">${Math.round(percentage)}%</span>
            </div>
            <div class="text-xs text-slate-400 mt-1">一人当たり: ${avgPerPerson.toLocaleString()}円</div>
          </div>
        `;
      }).join('');

      content.innerHTML = html || '<p class="text-sm text-slate-400">データなし</p>';
    }

    // 購入履歴
    function renderHistory() {
      const records = getFilteredRecords();
      const listEl = document.getElementById('history-list');
      const emptyEl = document.getElementById('history-empty');
      document.getElementById('history-count').textContent = records.length + '件';

      if (records.length === 0) {
        listEl.innerHTML = '';
        emptyEl.classList.remove('hidden');
        return;
      }
      emptyEl.classList.add('hidden');

      const reversed = [...records].reverse();
      listEl.innerHTML = reversed.map((r, i) => {
        const items = prices.filter(p => (r[p + '円'] || 0) > 0).map(p => p + '円×' + r[p + '円']).join('、');
        return `
          <div class="py-3 ${i < reversed.length - 1 ? 'border-b border-slate-100' : ''}">
            <div class="flex justify-between items-start">
              <div>
                <span class="text-xs text-slate-400">${r.日時}</span>
                <p class="font-bold text-slate-700">${r.氏名} <span class="font-normal text-sm text-slate-400">${r.所属}</span></p>
                <p class="text-sm text-slate-500">${items}</p>
              </div>
              <p class="font-bold text-amber-700 text-lg whitespace-nowrap ml-3">${(r.合計金額 || 0).toLocaleString()}円</p>
            </div>
          </div>`;
      }).join('');
    }

    // Excel出力（選択中の月 or 全期間）
    document.getElementById('btn-owner-export').addEventListener('click', () => {
      const records = getFilteredRecords();
      if (records.length === 0) { alert('出力するデータがありません'); return; }

      const ws = XLSX.utils.json_to_sheet(records);
      ws['!cols'] = [
        { wch: 18 }, { wch: 10 }, { wch: 14 }, { wch: 20 },
        { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 6 }, { wch: 10 }
      ];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '購入記録');

      const label = availableMonths[selectedMonthIndex] || '全期間';
      let suffix;
      if (label === '全期間') {
        suffix = '全期間';
      } else {
        suffix = label.replace('/', '');
      }
      XLSX.writeFile(wb, 'グリコ購入記録_' + suffix + '.xlsx');
    });


    // 戻る
    document.getElementById('btn-owner-exit').addEventListener('click', () => {
      staffIdInput.value = ''; showScreen('input'); staffIdInput.focus();
    });
  </script>

</body>
</html>
